repos:
  # Prettier - JavaScript/TypeScript/JSX 代码格式化
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Prettier (JavaScript/JSX)
        types_or: [javascript, jsx]
        exclude: ^(node_modules|\.venv|dist|build)/
        additional_dependencies:
          - prettier@3.8.1

  # ESLint - JavaScript/JSX 代码检查
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.9.0
    hooks:
      - id: eslint
        name: ESLint (JavaScript/JSX)
        types_or: [javascript, jsx]
        exclude: ^(node_modules|\.venv|dist|build)/
        args: ["--fix"]
        additional_dependencies:
          - eslint@8.55.0
          - eslint-plugin-react@7.33.2
          - eslint-plugin-react-hooks@4.6.0
          - eslint-plugin-react-refresh@0.4.5

  # Black - Python 代码格式化
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: Black (Python)
        language_version: python3
        exclude: ^(node_modules|\.venv|dist|build|__pycache__)/

  # Ruff - Python 代码检查和格式化
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff
        name: Ruff (Python)
        args: [--fix]
        exclude: ^(node_modules|\.venv|dist|build|__pycache__)/
      - id: ruff-format
        name: Ruff Format (Python)
        exclude: ^(node_modules|\.venv|dist|build|__pycache__)/

  # 检查文件末尾是否有换行符
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: ^(node_modules|\.venv|dist|build|__pycache__)/
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: ^(node_modules|\.venv|dist|build|__pycache__)/
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=500']

  # 自定义本地 hooks
  - repo: local
    hooks:
      - id: check-debug-statements
        name: Check for debug statements
        entry: bash -c 'grep -r "console\.log\|debugger\|alert\|TODO\|FIXME" --include="*.js" --include="*.jsx" --include="*.py" . | grep -v node_modules | grep -v .venv | grep -v dist | grep -v build | head -20'
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        description: Check for debug statements in code (warning only)
