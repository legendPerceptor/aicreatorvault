services:
  # ==================== 前端 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE=/api
    depends_on:
      - backend
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== 后端 ====================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      - PORT=3001
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-aicreatorvault}
      - DB_USER=${DB_USER:-aicreator}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - IMAGE_SERVICE_URL=http://image-service:8001
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - BRAVE_IMAGE_SEARCH_URL=https://api.search.brave.com/res/v1/images/search
      - SOCKS_PROXY_HOST=${SOCKS_PROXY_HOST:-aigc-xray}
      - SOCKS_PROXY_PORT=${SOCKS_PROXY_PORT:-1080}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - HTTP_PROXY=http://aigc-xray:1087
      - HTTPS_PROXY=http://aigc-xray:1087
      - NO_PROXY=localhost,127.0.0.1,postgres,redis,qdrant,image-service,frontend
      - IMAGE_GEN_API_URL=${IMAGE_GEN_API_URL:-https://api.minimaxi.com/v1/image_generation}
      - IMAGE_GEN_API_KEY=${IMAGE_GEN_API_KEY:?IMAGE_GEN_API_KEY is required}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-${IMAGE_GEN_API_KEY}}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_CHAT_MODEL=${ANTHROPIC_CHAT_MODEL:-claude-sonnet-4-20250514}
      - OLLAMA_CHAT_URL=${OLLAMA_CHAT_URL:-http://host.docker.internal:11434/v1/chat/completions}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-llama3}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-7d}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-true}
    volumes:
      # 使用 bind mount，数据存储在宿主机
      # 修改为你 NAS 上的实际路径
      - ${UPLOADS_PATH:-./uploads}:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      image-service:
        condition: service_started
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/prompts"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== AI 图片服务 ====================
  image-service:
    build:
      context: ./image-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_URL=http://qdrant:6333
      - SERVICE_PORT=8001
      - LIGHTRAG_WORKING_DIR=/app/lightrag_data
      # 通过 aigc-xray 代理访问 OpenAI API
      - HTTP_PROXY=http://aigc-xray:1087
      - HTTPS_PROXY=http://aigc-xray:1087
      - NO_PROXY=localhost,127.0.0.1,qdrant,backend,redis,postgres,api.search.brave.com
    volumes:
      # 共享 uploads 目录（只读），用于分析图片
      - ${UPLOADS_PATH:-./uploads}:/app/uploads:ro
      # LightRAG 持久化存储（知识图谱、KV 缓存）
      - lightrag_data:/app/lightrag_data
    depends_on:
      - qdrant
      - aigc-xray
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== PostgreSQL + pgvector ====================
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-aicreator}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - POSTGRES_DB=${DB_NAME:-aicreatorvault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aicreator} -d ${DB_NAME:-aicreatorvault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== Qdrant 向量数据库 ====================
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aicreatorvault-net
    restart: unless-stopped

  # ==================== Xray 代理 ====================
  aigc-xray:
    image: teddysun/xray
    container_name: aigc-xray
    restart: unless-stopped
    ports:
      - "8107:1087"   # HTTP 代理 (避免与现有 xray 冲突)
    volumes:
      - ${XRAY_CONFIG_PATH:?XRAY_CONFIG_PATH is required}:/etc/xray/config.json:ro
    networks:
      - aicreatorvault-net
    healthcheck:
      test: ["CMD", "xray", "version"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  lightrag_data:

networks:
  aicreatorvault-net:
    driver: bridge
