server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 允许上传大文件（最大 50MB）
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # API proxy to backend
    # Use ^~ to prevent regex locations from overriding this prefix match
    location ^~ /api {
        proxy_pass http://aicreatorvault-backend-1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Pass through Set-Cookie and CORS headers from backend
        proxy_pass_header Set-Cookie;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Origin;
    }

    # Uploads proxy to backend (for serving images)
    # 使用 ^~ 确保优先级高于正则匹配
    location ^~ /uploads {
        proxy_pass http://aicreatorvault-backend-1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 图片缓存
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Temp proxy to backend (for serving temp generated images)
    location ^~ /temp {
        proxy_pass http://aicreatorvault-backend-1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 不缓存 temp 文件
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
